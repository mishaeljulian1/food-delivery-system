<mat-toolbar color="primary" class="navbar">
  <a routerLink="/restaurants" class="brand">
    <mat-icon>restaurant</mat-icon>
    <span>Namma Bites</span>
  </a>

  <span class="spacer"></span>

  <nav class="nav-links">
    <a mat-button routerLink="/restaurants" routerLinkActive="active-link">
      <mat-icon>store</mat-icon> Restaurants
    </a>

    <a mat-button routerLink="/cart" routerLinkActive="active-link" class="cart-btn">
      <mat-icon
        [matBadge]="(count$ | async) || null"
        matBadgeColor="warn"
        matBadgeSize="small"
        [matBadgeHidden]="(count$ | async) === 0"
      >shopping_cart</mat-icon>
      Cart
    </a>

    <a mat-button routerLink="/order-status/last" routerLinkActive="active-link">
      <mat-icon>receipt_long</mat-icon> Orders
    </a>
  </nav>
</mat-toolbar>
